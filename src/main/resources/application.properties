spring.application.name=SimpleHttp
server.port=35000

# DB
spring.datasource.url=jdbc:mysql://localhost:3306/simplehttp?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=Pass001!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect



# Redis核心连接配置（SpringBoot 3.x 推荐前缀）
# 本地Redis地址
spring.data.redis.host=localhost
# Redis默认端口（注释单独行）
spring.data.redis.port=6379
# 数据库索引（0-15）
spring.data.redis.database=0
# 连接超时时间
spring.data.redis.timeout=10000ms
# Redis密码（无密码则留空）
spring.data.redis.password=